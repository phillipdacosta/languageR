services:
  - type: web
    name: languager-backend
    rootDir: backend
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URL_DEV
        value: https://languager-frontend.onrender.com
      - key: EMAIL_PUBLIC_FRONTEND_URL
        sync: false
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false
      - key: AUTH0_CLIENT_ID
        sync: false
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERT
        sync: false
      - key: AGORA_TEMP_TOKEN
        sync: false
      - key: GOOGLE_CLOUD_BUCKET_NAME
        sync: false
      - key: GOOGLE_CLOUD_PROJECT_ID
        sync: false
      - key: GOOGLE_CLOUD_KEY_FILE
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false

  - type: web
    name: languager-frontend
    env: static
    rootDir: language-learning-app
    # Use the production Angular configuration so environment.prod.ts is the
    # one bundled into the deployed app. Anything that depended on the
    # "staging" file (which had production: false) should now read from
    # environment.prod.ts.
    buildCommand: NODE_OPTIONS='--max-old-space-size=4096' npm ci && npm run build:prod
    staticPublishPath: www
