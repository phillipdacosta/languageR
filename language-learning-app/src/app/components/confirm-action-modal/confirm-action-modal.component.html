<ion-header>
  <ion-toolbar>
    <ion-title>{{ title }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">
        <ion-icon name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="confirm-content">
    <!-- Participant Info Card -->
    <div class="participant-card" *ngIf="participantAvatar || participantName">
      <div class="participant-avatar">
        <ion-avatar *ngIf="participantAvatar">
          <img [src]="participantAvatar" [alt]="participantName || 'Participant'" referrerpolicy="no-referrer">
        </ion-avatar>
        <div class="avatar-placeholder" *ngIf="!participantAvatar">
          <ion-icon name="person"></ion-icon>
        </div>
      </div>
      <div class="participant-details">
        <h3 class="participant-name">{{ participantName }}</h3>
      </div>
    </div>

    <!-- Action Info Section -->
    <div class="action-info-section">
      <div class="action-icon" [class]="iconColor">
        <ion-icon [name]="icon"></ion-icon>
      </div>
      <div class="action-message">
        <p class="main-message">{{ message }}</p>
      </div>
    </div>

    <!-- Notification Message -->
    <div class="notification-section" *ngIf="notificationMessage">
      <ion-icon name="notifications-outline"></ion-icon>
      <span>{{ notificationMessage }}</span>
    </div>
  </div>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <div class="button-group">
      <ion-button 
        expand="block" 
        fill="outline" 
        (click)="dismiss()">
        {{ cancelText }}
      </ion-button>
      <ion-button 
        expand="block" 
        [color]="confirmColor"
        (click)="confirm()">
        {{ confirmText }}
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
