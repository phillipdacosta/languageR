<div class="confirm-dialog">
  <button
    type="button"
    class="dialog-close"
    aria-label="Close"
    (click)="dismiss()">
    <ion-icon name="close"></ion-icon>
  </button>

  <div class="action-icon" [class]="iconColor">
    <ion-icon [name]="icon"></ion-icon>
  </div>

  <h2 class="dialog-title">{{ title }}</h2>

  <div class="participant-chip" *ngIf="participantAvatar || participantName">
    <ion-avatar *ngIf="participantAvatar">
      <img [src]="participantAvatar" [alt]="participantName || 'Participant'" referrerpolicy="no-referrer">
    </ion-avatar>
    <div class="avatar-placeholder" *ngIf="!participantAvatar">
      <ion-icon name="person"></ion-icon>
    </div>
    <span class="participant-name">{{ participantName }}</span>
  </div>

  <p class="dialog-message">{{ message }}</p>

  <div class="notification-section" *ngIf="notificationMessage">
    <ion-icon name="notifications-outline"></ion-icon>
    <span>{{ notificationMessage }}</span>
  </div>

  <div class="button-row">
    <button
      type="button"
      class="btn btn-secondary"
      (click)="secondaryClick()">
      {{ cancelText }}
    </button>
    <button
      type="button"
      class="btn btn-primary"
      [class.is-danger]="confirmColor === 'danger'"
      [class.is-warning]="confirmColor === 'warning'"
      [class.is-success]="confirmColor === 'success'"
      (click)="confirm()">
      {{ confirmText }}
    </button>
  </div>
</div>
