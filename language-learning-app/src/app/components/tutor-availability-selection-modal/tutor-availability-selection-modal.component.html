<ion-content class="ion-padding availability-selection-modal-content">
  <!-- Floating close button (always visible) -->
  <ion-button class="floating-close-button" fill="clear" (click)="dismiss()">
    <ion-icon name="close" slot="icon-only"></ion-icon>
  </ion-button>

  <!-- Back button (when viewing individual tutor availability OR checkout) -->
  <ion-button *ngIf="(!showTutorList || showCheckout) && (tutors.length > 1 || showCheckout)" class="floating-back-button" fill="clear" (click)="showCheckout ? goBackToAvailability() : goBackToList()">
    <ion-icon name="arrow-back" slot="icon-only"></ion-icon>
  </ion-button>

  <!-- Tutor List View -->
  <div class="view-container tutor-list-view" *ngIf="showTutorList" [@slideInOut]="animationDirection">
    <!-- Header -->
    <div class="modal-header">
      <div class="header-icon">
        <ion-icon name="calendar-outline"></ion-icon>
      </div>
      <h1 class="modal-title">{{ title }}</h1>
      <p class="modal-subtitle">Select a tutor to view their available times</p>
    </div>

    <!-- Tutor List -->
    <div class="tutor-list">
      <div 
        class="tutor-card" 
        *ngFor="let tutor of tutors"
        (click)="selectTutor(tutor)">
        <div class="tutor-info">
          <ion-avatar class="tutor-avatar">
            <img *ngIf="tutor.picture" [src]="tutor.picture" [alt]="formatTutorName(tutor)" referrerpolicy="no-referrer">
            <ion-icon *ngIf="!tutor.picture" name="person" class="avatar-placeholder"></ion-icon>
          </ion-avatar>
          <div class="tutor-details">
            <h3 class="tutor-name">{{ formatTutorName(tutor) }}</h3>
            <p class="tutor-availability">New times available</p>
          </div>
        </div>
        <ion-button fill="solid" size="small" class="view-button">
          View Times
          <ion-icon name="arrow-forward" slot="end"></ion-icon>
        </ion-button>
      </div>
    </div>
  </div>

  <!-- Availability View (Single Tutor) -->
  <div class="view-container availability-view" *ngIf="!showTutorList && !showCheckout && selectedTutor" [@slideInOut]="animationDirection">
    <!-- Tutor Info Section -->
    <div class="tutor-section">
      <ion-avatar class="tutor-avatar-large">
        <img *ngIf="selectedTutor.picture" [src]="selectedTutor.picture" [alt]="formatTutorName(selectedTutor)" referrerpolicy="no-referrer">
        <ion-icon *ngIf="!selectedTutor.picture" name="person" class="avatar-placeholder"></ion-icon>
      </ion-avatar>
      <div class="tutor-info-text">
        <h3>{{ formatTutorName(selectedTutor) }}</h3>
        <p>Select a time slot</p>
      </div>
    </div>

    <!-- Availability Calendar (Inline) — uses confirmation step like tutor profile -->
    <div class="calendar-section">
      <app-tutor-availability-viewer
        [tutorId]="getTutorId(selectedTutor)"
        [tutorName]="formatTutorName(selectedTutor)"
        [inline]="true"
        [showDurationSelector]="true"
        (paymentRequested)="onPaymentRequested($event)">
      </app-tutor-availability-viewer>
    </div>
  </div>
  
  <!-- Checkout View (Embedded Checkout Component) -->
  <div class="checkout-view" *ngIf="showCheckout && selectedTutor && selectedDate && selectedTime && getTutorId(selectedTutor)" [@slideInOut]="animationDirection">
    <app-checkout
      [tutorId]="getTutorId(selectedTutor)"
      [dateIso]="selectedDate"
      [time]="selectedTime"
      [lessonMinutes]="lessonDuration"
      [embedded]="true"
      (bookingComplete)="onBookingComplete()"
      (cancelled)="onCheckoutCancelled()">
    </app-checkout>
  </div>
</ion-content>
