<ion-content class="ion-padding">
  <!-- Floating close button (matches reschedule modal) -->
  <ion-button class="floating-close-button" fill="clear" (click)="cancel()">
    <ion-icon name="close" slot="icon-only"></ion-icon>
  </ion-button>

  <div class="modal-content">
    <!-- Title -->
    <h2 class="modal-title">Crop Profile Picture</h2>

    <!-- Controls (moved above cropper for visibility) -->
    <div class="controls" *ngIf="showCropper">
      <div class="controls-row">
        <div class="control-group">
          <ion-button fill="clear" (click)="zoomOut()" [disabled]="scale <= 0.5" class="control-btn">
            <ion-icon name="remove-circle-outline"></ion-icon>
          </ion-button>
          <span class="control-label">Zoom</span>
          <ion-button fill="clear" (click)="zoomIn()" [disabled]="scale >= 3" class="control-btn">
            <ion-icon name="add-circle-outline"></ion-icon>
          </ion-button>
        </div>

        <div class="control-group">
          <ion-button fill="clear" (click)="rotateLeft()" class="control-btn">
            <ion-icon name="arrow-undo-outline"></ion-icon>
          </ion-button>
          <span class="control-label">Rotate</span>
          <ion-button fill="clear" (click)="rotateRight()" class="control-btn">
            <ion-icon name="arrow-redo-outline"></ion-icon>
          </ion-button>
        </div>

        <ion-button (click)="resetImage()" fill="outline" class="reset-btn">
          <ion-icon name="refresh-outline" slot="start"></ion-icon>
          Reset
        </ion-button>
      </div>
    </div>

    <!-- Cropper -->
    <div class="cropper-wrapper">
      <image-cropper
        [imageChangedEvent]="imageChangedEvent"
        [maintainAspectRatio]="true"
        [aspectRatio]="1"
        [resizeToWidth]="400"
        [cropperMinWidth]="128"
        [onlyScaleDown]="true"
        [roundCropper]="false"
        [canvasRotation]="canvasRotation"
        [transform]="transform"
        [alignImage]="'center'"
        [backgroundColor]="'#f8f9fa'"
        format="png"
        (imageCropped)="imageCropped($event)"
        (imageLoaded)="imageLoaded($event)"
        (cropperReady)="cropperReady()"
        (loadImageFailed)="loadImageFailed()"
      ></image-cropper>
    </div>
  </div>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <div class="button-group">
      <ion-button 
        expand="block" 
        fill="outline"
        (click)="cancel()">
        Cancel
      </ion-button>
      <ion-button 
        expand="block"
        color="primary"
        (click)="crop()"
        [disabled]="!croppedImage">
        Crop & Save
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
