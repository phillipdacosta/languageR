<div class="mobile-section mobile-section-actions m-stagger m-stagger-3" [class.m-stagger-go]="staggerReady" [class.m-stagger-done]="staggerDone">
  <h3 class="mobile-section-title">{{ 'HOME.QUICK_ACTIONS' | translate }}</h3>
  <div class="mobile-actions-grid" [class.qa-go]="quickActionsReady" [class.qa-entered]="quickActionsAnimated">
    <button type="button" class="mobile-action-card mac-action-classes qa-pop qa-pop-1" (click)="navigateToExplore.emit()">
      <div class="mac-icon">
        <img class="mac-icon-img" [src]="isDarkModeActive ? 'assets/quick-actions-classes-original.png' : 'assets/quick-actions-classes.png'" alt="" />
      </div>
      <div class="mac-text">
        <span class="mac-title" *ngIf="isTutorUser">{{ 'HOME.CLASSES_TUTOR' | translate }}</span>
        <span class="mac-title" *ngIf="!isTutorUser">{{ 'HOME.CLASSES' | translate }}</span>
        <span class="mac-sub" *ngIf="isTutorUser">{{ 'HOME.CLASSES_TUTOR_SUB' | translate }}</span>
        <span class="mac-sub" *ngIf="!isTutorUser">{{ 'HOME.CLASSES_SUB' | translate }}</span>
      </div>
    </button>
    <button type="button" class="mobile-action-card mac-action-create-material qa-pop qa-pop-2" *ngIf="showCreateMaterial" (click)="navigateToCreateMaterial.emit($event)">
      <div class="mac-icon">
        <img class="mac-icon-img" [src]="isDarkModeActive ? 'assets/quick-actions-create-material-original.png' : 'assets/quick-actions-create-material.png'" alt="" />
      </div>
      <div class="mac-text">
        <span class="mac-title">{{ 'HOME.CREATE_MATERIAL' | translate }}</span>
        <span class="mac-sub">{{ 'HOME.CREATE_MATERIAL_SUB' | translate }}</span>
      </div>
    </button>
    <button type="button" class="mobile-action-card mac-action-practice qa-pop qa-pop-2" *ngIf="showPractice" (click)="navigateToPractice.emit()">
      <div class="mac-icon mac-icon--practice">
        <ion-icon name="layers-outline"></ion-icon>
        <span class="mac-badge" *ngIf="practiceDueCount > 0">{{ practiceDueCount > 99 ? '99+' : practiceDueCount }}</span>
      </div>
      <div class="mac-text">
        <span class="mac-title">{{ 'HOME.PRACTICE' | translate }}</span>
        <span class="mac-sub" *ngIf="practiceDueCount > 0">{{ 'HOME.PRACTICE_DUE_SUB' | translate: { count: practiceDueCount } }}</span>
        <span class="mac-sub" *ngIf="practiceDueCount === 0">{{ 'HOME.PRACTICE_EMPTY_SUB' | translate }}</span>
      </div>
    </button>
    <button type="button" class="mobile-action-card mac-action-forum qa-pop qa-pop-3" (click)="navigateToForum.emit()">
      <div class="mac-icon">
        <img class="mac-icon-img" [src]="isDarkModeActive ? 'assets/quick-actions-forum-original.png' : 'assets/quick-actions-forum.png'" alt="" />
      </div>
      <div class="mac-text">
        <span class="mac-title">{{ 'HOME.FORUM' | translate }}</span>
        <span class="mac-sub" *ngIf="isTutorUser">{{ 'HOME.FORUM_SUB_TUTOR' | translate }}</span>
        <span class="mac-sub" *ngIf="!isTutorUser">{{ 'HOME.FORUM_SUB_STUDENT' | translate }}</span>
      </div>
    </button>
    <button class="mobile-action-card mac-action-reviews qa-pop qa-pop-4">
      <div class="mac-icon">
        <img class="mac-icon-img" [src]="isDarkModeActive ? 'assets/quick-actions-reviews-original.png' : 'assets/quick-actions-reviews.png'" alt="" />
      </div>
      <div class="mac-text">
        <span class="mac-title">{{ 'HOME.MY_REVIEWS' | translate }}</span>
        <span class="mac-sub">{{ 'HOME.MY_REVIEWS_SUB' | translate }}</span>
      </div>
    </button>
  </div>
</div>
