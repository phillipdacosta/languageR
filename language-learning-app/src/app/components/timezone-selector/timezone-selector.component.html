<ion-content>
  <ion-button class="floating-close-button" fill="clear" (click)="cancel()">
    <ion-icon name="close" slot="icon-only"></ion-icon>
  </ion-button>

  <div class="modal-content">
    <div class="icon-wrapper">
      <ion-icon name="globe-outline"></ion-icon>
    </div>

    <h1 class="modal-heading">{{ modalHeading }}</h1>

    <p class="modal-description">{{ modalDescription }}</p>

    <p class="modal-current-tz" *ngIf="modalCurrentTzLine">{{ modalCurrentTzLine }}</p>

    <div class="search-wrapper">
      <ion-searchbar
        #timezoneSearch
        [(ngModel)]="searchTerm"
        [placeholder]="searchPlaceholderText"
        (ionInput)="onSearchInput()"
        mode="ios"
        debounce="200"
        show-clear-button="focus"
        class="modern-search">
      </ion-searchbar>
    </div>

    <div class="timezone-list">
      <button
        type="button"
        *ngFor="let timezone of flatFilteredTimezones; trackBy: trackByTimezone"
        class="timezone-item"
        [class.selected]="isSelected(timezone)"
        (click)="selectPendingTimezone(timezone)">
        <div class="timezone-labels">
          <span class="timezone-name">{{ timezone.label }}</span>
          <span class="timezone-offset">{{ timezone.offset }}</span>
        </div>
        <ion-icon
          *ngIf="isSelected(timezone)"
          name="checkmark-circle"
          class="check-icon">
        </ion-icon>
      </button>
    </div>

    <div *ngIf="flatFilteredTimezones.length === 0 && searchTerm.trim()" class="no-results">
      <ion-icon name="search-outline"></ion-icon>
      <p>{{ noResultsLabel }} <strong>"{{ searchTerm }}"</strong></p>
    </div>
  </div>
</ion-content>

<ion-footer class="timezone-modal-footer">
  <ion-toolbar>
    <ion-buttons slot="end">
      <ion-button
        class="change-action"
        fill="solid"
        [disabled]="pendingTimezone === savedTimezone"
        (click)="confirmChange()">
        {{ changeButtonLabel }}
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-footer>
