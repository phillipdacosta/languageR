<ion-header class="ion-no-border">
  <ion-toolbar class="onboarding-toolbar pre-step-toolbar">
    <ion-buttons slot="start">
      <div class="app-icon-container">
        <img src="assets/icons-app-bird-2.png" alt="Barnabi" class="app-icon">
        <img src="assets/barnabi-logo.png" alt="Barnabi" class="app-name-logo barnabi-wordmark-for-light-ui" />
        <img src="assets/barnabi-logo-wordmark-white.png" alt="" class="app-name-logo barnabi-wordmark-for-dark-ui" aria-hidden="true" />
      </div>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-button fill="clear" class="logout-btn" (click)="handleLogout()">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<div class="pre-step-container pre-step-container--scrollable">
  <div class="pre-step-inner">
    <div class="pre-step-logo">
      <img src="assets/icons-app-bird-2.png" alt="Barnabi" class="pre-step-app-icon">
    </div>

    <div class="pre-step-rotating-heading">
      <span
        *ngFor="let headingKey of headingRotationKeys; let i = index"
        class="rotating-text"
        [class.visible]="i === activeHeadingIndex">{{ headingKey | translate }}</span>
    </div>
    <p class="pre-step-subtitle">{{ 'ONBOARDING.LANG_SELECT.CHOOSE_SUBTITLE' | translate }}</p>

    <div class="pre-step-language-scroll">
      <div class="pre-step-language-grid">
        <button
          *ngFor="let lang of availableInterfaceLanguages"
          type="button"
          class="pre-step-lang-card"
          [class.selected]="selectedInterfaceLanguage === lang.code"
          (click)="selectInterfaceLanguage(lang.code)">
          <span class="lang-flag">
            <app-flag-icon [language]="lang.name" [size]="28"></app-flag-icon>
          </span>
          <div class="lang-labels">
            <span class="lang-native-name">{{ lang.nativeName }}</span>
            <span class="lang-english-name">{{ lang.name }}</span>
          </div>
          <div class="lang-check" *ngIf="selectedInterfaceLanguage === lang.code">
            <ion-icon name="checkmark-circle"></ion-icon>
          </div>
        </button>
      </div>
    </div>

    <div class="pre-step-cta-wrapper">
      <button type="button" class="pre-step-cta" (click)="confirmLanguageSelection()">
        {{ 'ONBOARDING.LANG_SELECT.CONFIRM' | translate }}
        <ion-icon name="arrow-forward"></ion-icon>
      </button>
    </div>

    <p class="pre-step-legal">
      {{ 'ONBOARDING.LEGAL.AGREE_PREFIX' | translate }}
      <a [href]="termsOfServiceHref" target="_blank" rel="noopener noreferrer">{{ 'ONBOARDING.LEGAL.TERMS' | translate }}</a> {{ 'ONBOARDING.LEGAL.AND' | translate }}
      <a [href]="privacyPolicyHref" target="_blank" rel="noopener noreferrer">{{ 'ONBOARDING.LEGAL.PRIVACY' | translate }}</a>
    </p>
  </div>
</div>
