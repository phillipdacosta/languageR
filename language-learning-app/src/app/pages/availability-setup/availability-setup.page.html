<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tutor-calendar" text="Back"></ion-back-button>
    </ion-buttons>
    <ion-title>Availability Setup</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" scrollY="true">
  <div class="avail-blocked" *ngIf="profileBlocked">
    <ion-icon name="alert-circle-outline" class="avail-blocked-icon"></ion-icon>
    <h3>Complete Your Profile First</h3>
    <p>You need to finish your profile setup before adding availability. This includes your photo, video, credentials, and payout method.</p>
    <ion-button fill="solid" (click)="goToSetup()">
      <ion-icon name="arrow-forward" slot="end"></ion-icon>
      Continue Setup
    </ion-button>
  </div>
  <app-availability-setup *ngIf="!profileBlocked" [targetDate]="selectedDate"></app-availability-setup>
</ion-content>
